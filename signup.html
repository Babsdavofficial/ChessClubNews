
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Chess News Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="panel" style="max-width:500px;margin:50px auto;padding:30px;">

  <div class="section-head" style="justify-content:center;text-align:center;">
    <div>
      <h1>♟️ Chess News Hub</h1>
      <p>Create your community account.</p>
    </div>
  </div>

  <div class="card">

    <div class="chip">🚀 Join the Community</div>

    <br>

    <label>Username</label>
    <input id="username" type="text" placeholder="Choose a username">

    <br><br>

    <label>Email Address</label>
    <input id="email" type="email" placeholder="Enter your email">

    <br><br>

    <label>Password</label>
    <input id="password" type="password" placeholder="Create a password">

    <br><br>

    <label>Confirm Password</label>
    <input id="confirmPassword" type="password" placeholder="Confirm password">

    <br><br>

    <button id="signupBtn" class="btn primary" style="width:100%;">
      Create Account
    </button>

    <p style="margin-top:20px;text-align:center;">
      Already have an account?
      <a href="login.html">Sign In</a>
    </p>

  </div>

</div>
<script type="module" src="firebase.js"></script>
<script type="module" src="auth.js"></script>
</body>
</html>
