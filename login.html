

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Chess News Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="panel" style="max-width:500px;margin:50px auto;padding:30px;">

  <div class="section-head" style="justify-content:center;text-align:center;">
    <div>
      <h1>♟️ Chess News Hub</h1>
      <p>Welcome back, player.</p>
    </div>
  </div>

  <div class="card">

    <div class="chip">🔐 Secure Login</div>

    <br>

    <label>Email Address</label>
    <input id="loginEmail" type="email" placeholder="Enter your email">

    <br><br>

    <label>Password</label>
    <input id="loginPassword" type="password" placeholder="Enter your password">

    <br><br>

    <button id="loginBtn" class="btn primary" style="width:100%;">
      Sign In
    </button>

    <p style="margin-top:20px;text-align:center;">
      New here?
      <a href="signup.html">Create an account</a>
    </p>

  </div>

</div>

<script type="module" src="auth.js"></script>

</body>
</html>
